<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Action ou Vérité</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="admin-page">
  <div class="noise"></div>

  <nav class="topnav">
    <span class="nav-logo">⚙️ Admin</span>
    <div class="nav-links">
      <a href="/game" class="nav-link">🎲 Jeu</a>
      <a href="/logout" class="nav-link">Quitter</a>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <h1 class="admin-title">Panneau d'administration</h1>
      <p class="admin-sub">Gère tous les défis du jeu</p>
    </div>

    <!-- Add form -->
    <div class="admin-add-card">
      <h3 class="card-title">Ajouter un défi</h3>
      <div class="add-form-grid">
        <select id="add-type" class="admin-select">
          <option value="action">⚡ Action</option>
          <option value="verite">💬 Vérité</option>
        </select>
        <select id="add-mode" class="admin-select">
          <option value="soft">🌸 Soft</option>
          <option value="hot">🔥 Hot</option>
        </select>
        <textarea id="add-text" class="admin-textarea" placeholder="Texte du défi…" rows="2"></textarea>
        <button class="btn btn-primary" id="add-btn">Ajouter ＋</button>
      </div>
      <div id="add-msg" class="add-msg hidden"></div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="tab active" data-filter="action-soft">⚡ Soft</button>
      <button class="tab" data-filter="action-hot">⚡ Hot</button>
      <button class="tab" data-filter="verite-soft">💬 Soft</button>
      <button class="tab" data-filter="verite-hot">💬 Hot</button>
    </div>

    <div class="admin-tab-labels">
      <span id="tab-label">Actions Soft</span>
      <span id="tab-count" class="tab-count">0 défis</span>
    </div>

    <div class="challenges-list" id="challenges-list">
      <div class="loading">Chargement…</div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
