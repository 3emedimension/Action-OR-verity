<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action ou Vérité</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-page">
  <div class="noise"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-wrap">
        <div class="logo-icon">🎲</div>
        <h1 class="logo-title">Action<span class="or-sep"> ou </span>Vérité</h1>
        <p class="logo-sub">La soirée commence ici</p>
      </div>

      <div class="login-form">
        <div class="input-group">
          <input
            type="password"
            id="password"
            placeholder="Mot de passe"
            autocomplete="current-password"
            autofocus
          />
          <span class="input-icon">🔑</span>
        </div>
        <div id="error-msg" class="error-msg hidden">Mot de passe incorrect ❌</div>
        <button id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Entrer</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('login-btn');
    const input = document.getElementById('password');
    const err = document.getElementById('error-msg');

    async function tryLogin() {
      const pw = input.value;
      if (!pw) { input.classList.add('shake'); setTimeout(() => input.classList.remove('shake'), 500); return; }
      btn.disabled = true;
      btn.querySelector('.btn-text').textContent = '…';
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: pw})
      });
      if (res.ok) {
        btn.querySelector('.btn-text').textContent = '✓';
        setTimeout(() => window.location.href = '/game', 400);
      } else {
        err.classList.remove('hidden');
        input.value = '';
        input.classList.add('shake');
        setTimeout(() => { input.classList.remove('shake'); btn.disabled = false; btn.querySelector('.btn-text').textContent = 'Entrer'; }, 600);
      }
    }

    btn.addEventListener('click', tryLogin);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); err.classList.add('hidden'); });
  </script>
</body>
</html>
